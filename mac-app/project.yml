# NetMon Server — generated by xcodegen.
# Edit this file, not the .xcodeproj.
# Regenerate with:  (cd mac-app && xcodegen generate)
#
# Source layout is folder-scanned, so dropping a new .swift file into
# NetMonServer/ (or any subdirectory) auto-adds it on the next regen.
# Resources/ is a folder reference — Xcode copies it verbatim into the
# app bundle (populated by scripts/prepare-python-bundle.sh).

name: NetMonServer
options:
  bundleIdPrefix: com.gbellas.netmon
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "0.1"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "9ZB72X2V54"
    CODE_SIGN_STYLE: Automatic
    SWIFT_STRICT_CONCURRENCY: complete
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  NetMonServer:
    type: application
    platform: macOS
    sources:
      - path: NetMonServer
        excludes:
          - "Info.plist"
          - "NetMonServer.entitlements"
          - "Resources"
      - path: NetMonServer/Resources
        buildPhase: resources
        type: folder
    info:
      path: NetMonServer/Info.plist
      properties:
        CFBundleDisplayName: NetMon Server
        CFBundleShortVersionString: "0.1"
        CFBundleVersion: "1"
        # LSUIElement + setActivationPolicy(.accessory) keep the app
        # menu-bar-only by default. The main window is opened on
        # demand; when visible, AppDelegate bumps policy to .regular
        # so the Dock icon appears, then restores .accessory when the
        # user closes it.
        LSUIElement: true
        LSMinimumSystemVersion: "14.0"
        NSHighResolutionCapable: true
        # macOS 15+ shows a local-network consent prompt on first
        # connect to LAN IPs. Our pollers talk to routers at
        # 192.168.*/10.* so we need this string.
        NSLocalNetworkUsageDescription: "NetMon Server polls your routers and other network devices on your LAN to show their status."
    settings:
      base:
        PRODUCT_NAME: "NetMon Server"
        PRODUCT_BUNDLE_IDENTIFIER: com.gbellas.netmon.server
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: NetMonServer/Info.plist
        CODE_SIGN_ENTITLEMENTS: NetMonServer/NetMonServer.entitlements
        ENABLE_HARDENED_RUNTIME: YES
    entitlements:
      path: NetMonServer/NetMonServer.entitlements
